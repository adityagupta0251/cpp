name: C++ CI (Validated LTS)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  # This remains necessary to silence the internal runner's deprecation warning
  # until GitHub flips the switch globally in June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # 'ubuntu-latest' always points to the latest Ubuntu LTS (e.g., 24.04 or 22.04)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # This ensures your project environment uses the latest LTS Node version
    - name: Setup Node.js (LTS Latest)
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install Compiler
      run: sudo apt-get update && sudo apt-get install -y g++

    - name: Compile & Validate Source
      run: |
        success=true
        for file in $(find . -name "*.cpp"); do
          echo "Checking $file..."
          # -c checks syntax/compilation without requiring a main()
          # -Wall -Wextra catches potential security vulnerabilities or bugs
          g++ -Wall -Wextra -c "$file" -o temp.o || success=false
          rm -f temp.o
        done
        
        if [ "$success" = false ]; then
          echo "CI Failed: Syntax or logical errors found in .cpp files."
          exit 1
        fi
